<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <?!= include('Stylesheet'); ?>
</head>
<body>
  <header class="app-header">
    <h1>シフト作成システム</h1>
    <div class="week-picker">
      <label>対象週（月曜日）:
        <input type="date" id="weekStartInput">
      </label>
      <button id="loadWeekBtn" class="btn-secondary">週を読み込む</button>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab-btn active" data-tab="tab1">① 制約表（希望集約）</button>
    <button class="tab-btn" data-tab="tab2">② シフト自動作成</button>
    <button class="tab-btn" data-tab="tab3">③ 違反チェック</button>
  </nav>

  <!-- Step1 -->
  <section id="tab1" class="tab-panel active">
    <div class="panel-grid">
      <div class="card">
        <h2>希望シフト提出</h2>
        <label>従業員
          <select id="requestEmployeeSelect"></select>
        </label>
        <div id="requestDaysContainer" class="request-days"></div>
        <button id="submitRequestBtn" class="btn-primary">提出する</button>
        <p id="submitRequestMsg" class="msg"></p>
      </div>

      <div class="card wide">
        <h2>制約表（集計ビュー）</h2>
        <p class="hint">★は資格保有者（責任者）を示します。</p>
        <button id="refreshConstraintBtn" class="btn-secondary">再集計</button>
        <div id="constraintTableContainer" class="table-container"></div>
      </div>
    </div>
  </section>

  <!-- Step2 -->
  <section id="tab2" class="tab-panel">
    <div class="card">
      <h2>必要人数設定（曜日×シフトごと）</h2>
      <p class="hint">早番・遅番それぞれについて、資格保有者と資格非保有者の必要人数を個別に指定できます。</p>
      <div id="staffingConfigContainer" class="table-container"></div>
      <button id="saveStaffingConfigBtn" class="btn-secondary">設定を保存</button>
      <p id="staffingConfigMsg" class="msg"></p>
    </div>

    <div class="card">
      <h2>担当者別 出勤回数の上限設定</h2>
      <p class="hint">空欄の場合は既定値（<span id="defaultLimitLabel">5</span>回/週）が適用されます。</p>
      <div id="employeeLimitContainer" class="table-container"></div>
      <button id="saveEmployeeLimitBtn" class="btn-secondary">上限を保存</button>
      <p id="employeeLimitMsg" class="msg"></p>
    </div>

    <div class="card">
      <h2>シフト自動作成</h2>
      <button id="generateShiftBtn" class="btn-primary">この週のシフトを自動生成</button>
      <button id="confirmShiftBtn" class="btn-secondary">このシフトを確定する</button>
      <div id="shortfallWarning" class="warning-box" style="display:none;"></div>
      <div id="shiftGridContainer" class="table-container"></div>
    </div>

    <div class="card">
      <h2>担当者別 出勤回数</h2>
      <p class="hint">★は資格保有者（責任者）を示します。上限を超えている場合は赤字で表示されます。</p>
      <div id="employeeSummaryContainer" class="table-container"></div>
    </div>
  </section>

  <!-- Step3 -->
  <section id="tab3" class="tab-panel">
    <div class="card">
      <h2>違反チェック</h2>
      <button id="runValidationBtn" class="btn-primary">違反を再チェック</button>
      <div id="validationSummary" class="summary-box"></div>
      <div id="violationListContainer" class="table-container"></div>
    </div>
  </section>

  <?!= include('JavaScript'); ?>
</body>
</html>
