<script>
  const WEEKDAY_JP = ['月', '火', '水', '木', '金', '土', '日'];
  const REQUEST_TYPES = ['休み希望', '早番のみ可', '遅番のみ可', '1日のみ可', '早番希望', '遅番希望', '1日希望', '指定なし'];
  const REQUEST_TYPE_DEFAULT = '指定なし';
  let currentWeekStart = null;
  let currentEmployees = [];

  document.addEventListener('DOMContentLoaded', () => {
    setupTabs();
    setDefaultWeek();
    document.getElementById('manualEntryDate').value = currentWeekStart;
    document.getElementById('loadWeekBtn').addEventListener('click', onLoadWeek);
    document.getElementById('submitRequestBtn').addEventListener('click', onSubmitRequest);
    document.getElementById('refreshConstraintBtn').addEventListener('click', () => loadConstraintTable(true));
    document.getElementById('generateShiftBtn').addEventListener('click', onGenerateShift);
    document.getElementById('confirmShiftBtn').addEventListener('click', onConfirmShift);
    document.getElementById('runValidationBtn').addEventListener('click', onRunValidation);
    document.getElementById('saveStaffingConfigBtn').addEventListener('click', onSaveStaffingConfig);
    document.getElementById('requestEmployeeSelect').addEventListener('change', renderRequestDaysForm);
    document.getElementById('saveEmployeeLimitBtn').addEventListener('click', onSaveEmployeeLimits);
    document.getElementById('addManualEntryBtn').addEventListener('click', onAddManualEntry);

    google.script.run.withSuccessHandler(employees => {
      currentEmployees = employees;
      renderEmployeeSelect(employees);
    }).apiGetEmployees();

    loadStaffingConfig();
    loadEmployeeLimits();
  });

  function setupTabs() {
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab).classList.add('active');
      });
    });
  }

  function setDefaultWeek() {
    const today = new Date();
    const day = today.getDay(); // 0=Sun
    const diffToMonday = (day === 0 ? -6 : 1 - day);
    const monday = new Date(today);
    monday.setDate(today.getDate() + diffToMonday);
    document.getElementById('weekStartInput').value = formatDateInput(monday);
    currentWeekStart = formatDateInput(monday);
  }

  function formatDateInput(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }

  function onLoadWeek() {
    currentWeekStart = document.getElementById('weekStartInput').value;
    if (!currentWeekStart) { alert('週の開始日（月曜）を選択してください'); return; }
    document.getElementById('manualEntryDate').value = currentWeekStart;
    renderRequestDaysForm();
    loadConstraintTable(false);
    loadShiftResult();
  }

  /* ---------- Step1 ---------- */

  function renderEmployeeSelect(employees) {
    const sel = document.getElementById('requestEmployeeSelect');
    sel.innerHTML = employees.map(e => `<option value="${e.EmployeeID}">${e['氏名']}</option>`).join('');
    renderRequestDaysForm();

    const manualSel = document.getElementById('manualEntryEmployee');
    manualSel.innerHTML = employees.map(e => `<option value="${e.EmployeeID}">${e['氏名']}</option>`).join('');
  }

  function renderRequestDaysForm() {
    const weekStart = currentWeekStart || document.getElementById('weekStartInput').value;
    const container = document.getElementById('requestDaysContainer');
    const dates = getWeekDates(weekStart);
    container.innerHTML = dates.map((d, i) => `
      <div class="request-day-row" data-date="${d}">
        <span>${WEEKDAY_JP[i]} (${d})</span>
        <select>
          ${REQUEST_TYPES.map(t => `<option value="${t}">${t}</option>`).join('')}
        </select>
      </div>
    `).join('');

    const employeeId = document.getElementById('requestEmployeeSelect').value;
    if (!employeeId || !weekStart) return;

    // 提出済みの希望があればプリフィルする（無ければ「指定なし」のまま）
    google.script.run.withSuccessHandler(existing => {
      document.querySelectorAll('#requestDaysContainer .request-day-row').forEach(row => {
        const select = row.querySelector('select');
        select.value = existing[row.dataset.date] || REQUEST_TYPE_DEFAULT;
      });
    }).apiGetEmployeeRequestsForWeek(employeeId, weekStart);
  }

  function getWeekDates(weekStartStr) {
    const start = new Date(weekStartStr);
    const arr = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(start);
      d.setDate(start.getDate() + i);
      arr.push(formatDateInput(d));
    }
    return arr;
  }

  function onSubmitRequest() {
    const weekStart = currentWeekStart || document.getElementById('weekStartInput').value;
    const employeeId = document.getElementById('requestEmployeeSelect').value;
    const rows = document.querySelectorAll('#requestDaysContainer .request-day-row');
    const entries = Array.from(rows).map(r => ({
      date: r.dataset.date,
      type: r.querySelector('select').value
    }));
    const msg = document.getElementById('submitRequestMsg');
    msg.textContent = '送信中...';
    google.script.run.withSuccessHandler(res => {
      msg.textContent = `送信しました（${res.count}件）`;
      loadConstraintTable(false);
      renderRequestDaysForm();
    }).withFailureHandler(err => { msg.textContent = 'エラー: ' + err.message; })
      .apiSubmitShiftRequest({ employeeId, weekStart, entries });
  }

  function loadConstraintTable(forceRefresh) {
    const weekStart = currentWeekStart || document.getElementById('weekStartInput').value;
    const container = document.getElementById('constraintTableContainer');
    container.innerHTML = '読み込み中...';
    google.script.run.withSuccessHandler(data => {
      renderConstraintTable(data);
    }).apiGetConstraintTable(weekStart);
  }

  function renderConstraintTable(data) {
    const container = document.getElementById('constraintTableContainer');
    if (!data.rows.length) { container.innerHTML = '<p>データがありません</p>'; return; }
    let html = '<table><thead><tr><th>氏名</th>';
    data.days.forEach(d => { html += `<th>${d.label}<br>${d.date}</th>`; });
    html += '</tr></thead><tbody>';
    data.rows.forEach(row => {
      const nameLabel = row['氏名'] + (isManagerId_(row['EmployeeID']) ? ' ★' : '');
      html += `<tr><td>${nameLabel}</td>`;
      data.days.forEach(d => { html += `<td>${row[d.label] || ''}</td>`; });
      html += '</tr>';
    });
    html += '</tbody></table>';
    container.innerHTML = html;
  }

  function isManagerId_(employeeId) {
    const emp = currentEmployees.find(e => String(e.EmployeeID) === String(employeeId));
    if (!emp) return false;
    const v = emp['資格'];
    return v === true || v === 'TRUE' || v === 1;
  }

  /* ---------- Step2: 必要人数設定 ---------- */

  function loadStaffingConfig() {
    const container = document.getElementById('staffingConfigContainer');
    container.innerHTML = '読み込み中...';
    google.script.run.withSuccessHandler(renderStaffingConfig).apiGetStaffingConfig();
  }

  function renderStaffingConfig(rows) {
    const container = document.getElementById('staffingConfigContainer');
    let html = '<table><thead><tr><th>曜日</th><th>シフト</th><th>資格保有者人数</th><th>資格非保有者人数</th><th>合計</th></tr></thead><tbody>';
    rows.forEach((r, i) => {
      const manager = r['資格保有者人数'];
      const nonManager = r['資格非保有者人数'];
      html += `<tr data-day="${r['曜日']}" data-shift="${r['シフト区分']}">
        <td>${r['曜日']}</td>
        <td>${r['シフト区分']}</td>
        <td><input type="number" min="0" class="staffing-input mgr-input" value="${manager}"></td>
        <td><input type="number" min="0" class="staffing-input nonmgr-input" value="${nonManager}"></td>
        <td class="staffing-total">${Number(manager) + Number(nonManager)}</td>
      </tr>`;
    });
    html += '</tbody></table>';
    container.innerHTML = html;

    // 入力変更のたびに合計列を再計算
    container.querySelectorAll('tr[data-day]').forEach(tr => {
      const mgrInput = tr.querySelector('.mgr-input');
      const nonMgrInput = tr.querySelector('.nonmgr-input');
      const totalCell = tr.querySelector('.staffing-total');
      const recalc = () => {
        totalCell.textContent = (Number(mgrInput.value) || 0) + (Number(nonMgrInput.value) || 0);
      };
      mgrInput.addEventListener('input', recalc);
      nonMgrInput.addEventListener('input', recalc);
    });
  }

  function onSaveStaffingConfig() {
    const container = document.getElementById('staffingConfigContainer');
    const payload = Array.from(container.querySelectorAll('tr[data-day]')).map(tr => ({
      day: tr.dataset.day,
      shiftType: tr.dataset.shift,
      manager: tr.querySelector('.mgr-input').value,
      nonManager: tr.querySelector('.nonmgr-input').value
    }));
    const msg = document.getElementById('staffingConfigMsg');
    msg.textContent = '保存中...';
    google.script.run.withSuccessHandler(() => {
      msg.textContent = '保存しました。次回のシフト生成・違反チェックから反映されます。';
    }).withFailureHandler(err => { msg.textContent = 'エラー: ' + err.message; })
      .apiUpdateStaffingConfig(payload);
  }

  /* ---------- Step2: 担当者別 出勤回数の上限設定 ---------- */

  function loadEmployeeLimits() {
    google.script.run.withSuccessHandler(defaultLimit => {
      document.getElementById('defaultLimitLabel').textContent = defaultLimit;
    }).apiGetDefaultWeeklyLimit();

    const container = document.getElementById('employeeLimitContainer');
    container.innerHTML = '読み込み中...';
    google.script.run.withSuccessHandler(renderEmployeeLimits).apiGetEmployees();
  }

  function renderEmployeeLimits(employees) {
    const container = document.getElementById('employeeLimitContainer');
    let html = '<table><thead><tr><th>氏名</th><th>週上限回数</th></tr></thead><tbody>';
    employees.forEach(e => {
      const limitValue = e['上限回数'] || '';
      html += `<tr data-employee-id="${e.EmployeeID}">
        <td>${e['氏名']}</td>
        <td><input type="number" min="1" class="staffing-input limit-input" placeholder="既定値" value="${limitValue}"></td>
      </tr>`;
    });
    html += '</tbody></table>';
    container.innerHTML = html;
  }

  function onSaveEmployeeLimits() {
    const container = document.getElementById('employeeLimitContainer');
    const payload = Array.from(container.querySelectorAll('tr[data-employee-id]')).map(tr => ({
      employeeId: tr.dataset.employeeId,
      limit: tr.querySelector('.limit-input').value
    }));
    const msg = document.getElementById('employeeLimitMsg');
    msg.textContent = '保存中...';
    google.script.run.withSuccessHandler(() => {
      msg.textContent = '保存しました。次回のシフト生成・違反チェックから反映されます。';
    }).withFailureHandler(err => { msg.textContent = 'エラー: ' + err.message; })
      .apiUpdateEmployeeLimits(payload);
  }

  /* ---------- Step2: シフトの手動追加（単発） ---------- */

  function onAddManualEntry() {
    const date = document.getElementById('manualEntryDate').value;
    const employeeId = document.getElementById('manualEntryEmployee').value;
    const shiftType = document.getElementById('manualEntryShiftType').value;
    const msg = document.getElementById('manualEntryMsg');

    if (!date || !employeeId) { msg.textContent = '日付と従業員を指定してください'; return; }

    msg.textContent = '追加中...';
    google.script.run.withSuccessHandler(res => {
      if (!res.success) { msg.textContent = 'エラー: ' + (res.message || '追加に失敗しました'); return; }
      msg.textContent = `追加しました（${res.dayLabel}・${date}）`;
      if (res.weekStart === currentWeekStart) {
        loadShiftResult();
      } else {
        msg.textContent += ` ※ 週開始日 ${res.weekStart} の週に追加されました。確認するにはその週を読み込んでください。`;
      }
    }).withFailureHandler(err => { msg.textContent = 'エラー: ' + err.message; })
      .apiAddManualShiftEntry({ date, employeeId, shiftType });
  }

  /* ---------- Step2: シフト生成 ---------- */

  function onGenerateShift() {
    const weekStart = currentWeekStart || document.getElementById('weekStartInput').value;
    document.getElementById('shiftGridContainer').innerHTML = '生成中...（最大20回試行しています）';
    google.script.run.withSuccessHandler(data => {
      renderShiftGrid(data.grid);
      renderShortfalls(data.shortfalls);
      renderEmployeeSummary(data.employeeSummary);
    }).withFailureHandler(err => {
      document.getElementById('shiftGridContainer').innerHTML = 'エラー: ' + err.message;
    }).apiGenerateDraftShift(weekStart);
  }

  function loadShiftResult() {
    const weekStart = currentWeekStart;
    google.script.run.withSuccessHandler(data => {
      if (data.rowCount > 0) {
        renderShiftGrid(data.grid);
        renderEmployeeSummary(data.employeeSummary);
      } else {
        document.getElementById('shiftGridContainer').innerHTML = '';
        document.getElementById('employeeSummaryContainer').innerHTML = '';
      }
    }).apiGetShiftResult(weekStart);
  }

  function renderEmployeeSummary(summary) {
    const container = document.getElementById('employeeSummaryContainer');
    if (!summary || summary.length === 0) { container.innerHTML = '<p>データがありません</p>'; return; }
    let html = '<table><thead><tr><th>氏名</th><th>早番</th><th>遅番</th><th>1日</th><th>合計</th><th>上限</th></tr></thead><tbody>';
    summary.forEach(s => {
      const nameLabel = s.name + (s.isManager ? ' ★' : '');
      const totalClass = s.overLimit ? 'count-short' : 'count-ok';
      html += `<tr><td>${nameLabel}</td><td>${s.early}</td><td>${s.late}</td><td>${s.fullDay}</td><td class="${totalClass}"><strong>${s.total}</strong></td><td>${s.limit}</td></tr>`;
    });
    html += '</tbody></table>';
    container.innerHTML = html;
  }

  function renderShortfalls(shortfalls) {
    const box = document.getElementById('shortfallWarning');
    if (!shortfalls || shortfalls.length === 0) { box.style.display = 'none'; return; }
    box.style.display = 'block';
    box.textContent = '人数が不足している枠があります:\n' +
      shortfalls.map(s => `・${s.date} ${s.shiftType} [${s.category}]: 必要${s.need}名 / 割当${s.actual}名`).join('\n');
  }

  function renderShiftGrid(grid) {
    const container = document.getElementById('shiftGridContainer');
    const dates = Object.keys(grid);
    if (dates.length === 0) { container.innerHTML = '<p>データがありません</p>'; return; }
    let html = '<table><thead><tr><th>区分</th>';
    dates.forEach(d => { html += `<th>${grid[d].label}<br>${d}</th>`; });
    html += '</tr></thead><tbody>';
    ['早番', '遅番', '1日'].forEach(shiftType => {
      html += `<tr><td>${shiftType}</td>`;
      dates.forEach(d => {
        const cell = grid[d][shiftType] || { people: [], required: { manager: 0, nonManager: 0, total: 0 }, actual: { manager: 0, nonManager: 0, total: 0 } };
        const people = cell.people || [];
        const list = people.map(p => `<div class="shift-person${p.isManager ? ' manager' : ''}">${p.name}</div>`).join('');
        const req = cell.required || { manager: 0, nonManager: 0, total: 0 };
        const act = cell.actual || { manager: 0, nonManager: 0, total: 0 };
        const mgrClass = act.manager < req.manager ? 'count-short' : 'count-ok';
        const totalClass = act.total < req.total ? 'count-short' : 'count-ok';
        let nonMgrClass = 'count-ok';
        let nonMgrNote = '';
        if (act.nonManager < req.nonManager) {
          if (act.total >= req.total) {
            // 資格保有者が代替しており、総人数としては充足している
            nonMgrClass = 'count-note';
            nonMgrNote = '（資格保有者が代替）';
          } else {
            nonMgrClass = 'count-short';
          }
        }
        const summary = `
          <div class="shift-count-summary">
            <div class="${mgrClass}">資格保有者 ${act.manager}/${req.manager}名</div>
            <div class="${nonMgrClass}">資格非保有者 ${act.nonManager}/${req.nonManager}名${nonMgrNote}</div>
            <div class="${totalClass}">合計 ${act.total}/${req.total}名</div>
          </div>`;
        html += `<td><div class="shift-cell-list">${list || '-'}</div>${summary}</td>`;
      });
      html += '</tr>';
    });
    html += '</tbody></table>';
    container.innerHTML = html;
  }

  function onConfirmShift() {
    const weekStart = currentWeekStart || document.getElementById('weekStartInput').value;
    if (!confirm('このシフトを確定しますか？')) return;
    google.script.run.withSuccessHandler(() => alert('確定しました')).apiConfirmShift(weekStart);
  }

  /* ---------- Step3 ---------- */

  function onRunValidation() {
    const weekStart = currentWeekStart || document.getElementById('weekStartInput').value;
    document.getElementById('violationListContainer').innerHTML = 'チェック中...';
    google.script.run.withSuccessHandler(renderValidationResult).apiRunValidation(weekStart);
  }

  function renderValidationResult(data) {
    const summary = document.getElementById('validationSummary');
    const listContainer = document.getElementById('violationListContainer');
    if (data.total === 0) {
      summary.className = 'summary-box ok';
      summary.textContent = '違反は検出されませんでした。';
      listContainer.innerHTML = '';
      return;
    }
    summary.className = 'summary-box';
    summary.textContent = `エラー ${data.errorCount}件 / 警告 ${data.warningCount}件`;

    let html = '<table><thead><tr><th>深刻度</th><th>種別</th><th>対象日</th><th>シフト</th><th>氏名</th><th>詳細</th></tr></thead><tbody>';
    data.violations.forEach(v => {
      html += `<tr class="violation-row severity-${v['深刻度']}">
        <td>${v['深刻度']}</td><td>${v['違反種別']}</td><td>${v['対象日']}</td>
        <td>${v['対象シフト']}</td><td>${v['氏名']}</td><td>${v['詳細']}</td>
      </tr>`;
    });
    html += '</tbody></table>';
    listContainer.innerHTML = html;
  }
</script>
